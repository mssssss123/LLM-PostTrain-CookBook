<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>LLM Post-Training Cookbook</title>
  <meta name="description" content="面向中文读者的大模型 Post-Training 教程：SFT、RL、RLHF、DPO、OPD、蒸馏、评估与部署。">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 18px;
      --base-line-height: 1.72;
      --base-background-color: #f7fbff;
      --base-color: #14243a;
      --paper: #f7fbff;
      --paper-soft: #edf6ff;
      --ink: #14243a;
      --muted: #5e7895;
      --quiet: #8aa1b8;
      --line: rgba(35, 106, 180, 0.13);
      --line-strong: rgba(35, 106, 180, 0.24);
      --accent: #2477ff;
      --accent-soft: rgba(36, 119, 255, 0.1);
      --copper: #2db7e5;
      --gold: #69c7ff;
      --sidebar-width: 258px;
      --sidebar-background: transparent;
      --sidebar-border-color: transparent;
      --theme-color: var(--accent);
      --link-color: #156eea;
      --link-color--hover: #0a55ca;
      --heading-color: var(--ink);
      --heading-h1-color: var(--ink);
      --heading-h2-border-color: transparent;
      --code-theme-background: #edf5ff;
      --code-inline-background: rgba(36, 119, 255, 0.1);
      --code-inline-color: #175bb8;
      --blockquote-background: transparent;
      --blockquote-border-color: var(--accent);
      --table-head-background: #e8f3ff;
      --table-row-even-background: rgba(36, 119, 255, 0.035);
      color-scheme: light;
    }

    [data-theme="dark"] {
      --base-background-color: #071423;
      --base-color: #e8f3ff;
      --paper: #071423;
      --paper-soft: #0d2035;
      --ink: #e8f3ff;
      --muted: #abc3dc;
      --quiet: #6e89a4;
      --line: rgba(154, 202, 255, 0.15);
      --line-strong: rgba(154, 202, 255, 0.28);
      --accent: #75b7ff;
      --accent-soft: rgba(117, 183, 255, 0.14);
      --copper: #67d7f0;
      --gold: #a9ddff;
      --link-color: #9ed0ff;
      --link-color--hover: #d3ecff;
      --heading-color: var(--ink);
      --heading-h1-color: var(--ink);
      --code-theme-background: #0d2035;
      --code-theme-text: #dbeaff;
      --code-theme-comment: #7390ad;
      --code-theme-keyword: #9ed0ff;
      --code-theme-function: #67d7f0;
      --code-theme-variable: #b9ddff;
      --code-inline-background: rgba(117, 183, 255, 0.14);
      --code-inline-color: #b9ddff;
      --table-head-background: #102944;
      --table-row-even-background: rgba(154, 202, 255, 0.045);
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--paper);
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 78% 8%, rgba(105, 199, 255, 0.28), transparent 28rem),
        linear-gradient(180deg, #ffffff 0, #f7fbff 46rem, #f3f9ff 100%);
      color: var(--ink);
      font-family: Georgia, "Iowan Old Style", "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
      text-rendering: optimizeLegibility;
    }

    [data-theme="dark"] body {
      background:
        radial-gradient(circle at 78% 8%, rgba(117, 183, 255, 0.16), transparent 28rem),
        linear-gradient(180deg, #0a1828 0, #071423 46rem, #06101d 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      opacity: 0.6;
      background-image:
        linear-gradient(90deg, rgba(36, 119, 255, 0.04) 1px, transparent 1px),
        linear-gradient(180deg, rgba(36, 119, 255, 0.035) 1px, transparent 1px);
      background-size: 72px 72px;
    }

    [data-theme="dark"] body::before {
      opacity: 0.25;
      background-image:
        linear-gradient(90deg, rgba(154, 202, 255, 0.045) 1px, transparent 1px),
        linear-gradient(180deg, rgba(154, 202, 255, 0.035) 1px, transparent 1px);
    }

    a {
      text-decoration-thickness: 1px;
      text-underline-offset: 0.18em;
    }

    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10000;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #2477ff, #69c7ff, #2db7e5);
      transition: width 0.12s linear;
    }

    .app-nav {
      position: fixed !important;
      top: 26px !important;
      left: auto !important;
      right: 118px !important;
      z-index: 60;
      width: auto !important;
      max-width: calc(100vw - 60px);
      margin: 0 !important;
      padding: 0 !important;
      color: var(--ink);
      font-size: 0.92rem;
    }

    .app-nav ul {
      display: flex;
      gap: 22px;
      align-items: center;
      margin: 0;
      padding: 0;
    }

    .app-nav li {
      margin: 0 !important;
    }

    .app-nav a {
      color: var(--muted);
      text-decoration: none;
      border: 0;
      font-weight: 600;
    }

    .app-nav a:hover {
      color: var(--accent);
    }

    .sidebar {
      left: 24px !important;
      top: 92px !important;
      width: var(--sidebar-width);
      height: calc(100vh - 112px);
      padding: 18px 16px 72px 18px !important;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(105, 199, 255, 0.18);
      border-radius: 18px;
      color: var(--quiet);
      opacity: 1;
      scrollbar-width: thin;
      box-shadow: 0 18px 55px rgba(41, 102, 170, 0.08);
    }

    [data-theme="dark"] .sidebar {
      background: rgba(9, 26, 44, 0.74);
      border-color: rgba(154, 202, 255, 0.15);
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.26);
    }

    .sidebar > h1 {
      position: fixed;
      top: 24px;
      left: 42px;
      z-index: 65;
      margin: 0;
      padding: 0;
      font-size: 2rem;
      line-height: 1;
      font-weight: 400;
      letter-spacing: 0;
    }

    .sidebar > h1 a {
      color: #1366d6;
      text-decoration: none;
    }

    [data-theme="dark"] .sidebar > h1 a {
      color: #9ed0ff;
    }

    .sidebar > h1 .app-name-link::after {
      content: "";
      display: inline-block;
      width: 0.32em;
      height: 0.32em;
      margin-left: 0.08em;
      border-radius: 50%;
      background: linear-gradient(135deg, #2477ff, #69c7ff);
      vertical-align: baseline;
    }

    .sidebar-nav {
      padding: 0 0 0 0;
    }

    .sidebar ul,
    .sidebar li {
      margin: 0;
      padding: 0;
    }

    .sidebar li {
      line-height: 1.18;
    }

    .sidebar-nav > ul > li {
      margin: 0 0 20px;
    }

    .sidebar-nav > ul > li > strong {
      display: block;
      margin: 22px 0 8px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .sidebar ul li a {
      display: block;
      margin: 0;
      padding: 3px 0 4px 12px;
      border: 0;
      border-left: 1px solid transparent;
      color: var(--quiet);
      font-size: 0.86rem;
      line-height: 1.22;
      text-decoration: none;
      transition: color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    .sidebar ul li a:hover {
      color: var(--ink);
      transform: translateX(2px);
    }

    .sidebar ul li.active > a,
    .sidebar ul li.active > a:hover {
      color: #0f4ea8;
      border-left-color: var(--accent);
      background: transparent;
      font-weight: 600;
    }

    .sidebar ul li ul {
      margin: 3px 0 8px 10px;
      border-left: 1px solid var(--line);
    }

    .sidebar ul li ul a {
      padding-left: 10px;
      font-size: 0.78rem;
      color: var(--quiet);
    }

    .sidebar-toggle {
      top: 22px;
      bottom: auto;
      left: 20px;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 30px rgba(41, 102, 170, 0.12);
    }

    .sidebar-toggle span {
      background-color: var(--ink);
    }

    .content {
      left: 0 !important;
      min-height: 100vh;
      padding-top: 0;
      margin-left: 0 !important;
      transition: none;
    }

    .markdown-section {
      max-width: 820px;
      margin-left: clamp(320px, 29vw, 430px);
      margin-right: auto;
      padding: 128px 44px 118px !important;
      color: var(--ink);
      font-size: 1rem;
    }

    .markdown-section > * {
      animation: article-rise 520ms ease both;
    }

    .markdown-section h1 {
      max-width: 760px;
      margin: 0 0 12px;
      padding: 0;
      border: 0;
      color: var(--ink);
      font-size: 3.05rem;
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      word-break: break-all;
      white-space: normal !important;
    }

    .markdown-section h1 * {
      overflow-wrap: anywhere !important;
      word-break: break-all !important;
      white-space: normal !important;
    }

    .markdown-section h1 .title-line {
      display: block;
    }

    .markdown-section h1 .title-line + .title-line::before {
      content: "";
    }

    .markdown-section h2 {
      margin: 3rem 0 1rem;
      padding: 0;
      border: 0;
      color: var(--ink);
      font-size: 1.72rem;
      line-height: 1.18;
      font-weight: 750;
      letter-spacing: 0;
    }

    .markdown-section h2::before {
      content: "";
      display: block;
      width: 34px;
      height: 2px;
      margin: 0 0 16px;
      background: linear-gradient(90deg, #2477ff, #69c7ff);
    }

    .markdown-section h3 {
      margin: 2rem 0 0.7rem;
      color: var(--ink);
      font-size: 1.22rem;
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: 0;
    }

    .markdown-section h4 {
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: 0.98rem;
      letter-spacing: 0.02em;
    }

    .markdown-section p,
    .markdown-section li {
      color: var(--ink);
      line-height: 1.75;
    }

    .markdown-section > p:first-of-type,
    .markdown-section h1 + p,
    .markdown-section h1 + h3 {
      color: var(--muted);
      font-size: 1.04rem;
      font-style: italic;
      line-height: 1.62;
    }

    .markdown-section strong {
      color: var(--ink);
    }

    .markdown-section blockquote {
      margin: 1.6rem 0;
      padding: 0.2rem 0 0.2rem 1.2rem;
      border-left: 2px solid var(--accent);
      color: var(--muted);
      background: transparent;
      font-style: italic;
    }

    .chapter-visual {
      position: relative;
      width: 100%;
      margin: 28px 0 28px;
      aspect-ratio: 16 / 6.25;
      min-height: 250px;
      overflow: hidden;
      border: 1px solid rgba(36, 119, 255, 0.16);
      border-radius: 18px;
      background: var(--paper-soft);
      box-shadow: 0 24px 70px rgba(41, 102, 170, 0.12);
    }

    [data-theme="dark"] .chapter-visual {
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    .chapter-visual canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hero-panel {
      margin: 20px 0 34px;
      padding: 0 0 0 22px;
      border: 0;
      border-left: 2px solid #69c7ff;
      border-radius: 0;
      background: transparent;
    }

    .hero-panel p {
      margin: 0.58rem 0;
      color: var(--ink);
      font-size: 1.02rem;
    }

    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin: 22px 0 30px;
    }

    .concept-card,
    .path-card,
    .checkpoint,
    .warning,
    .recipe-card {
      min-height: 100%;
      padding: 18px 18px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 14px 36px rgba(41, 102, 170, 0.08);
    }

    [data-theme="dark"] .concept-card,
    [data-theme="dark"] .path-card,
    [data-theme="dark"] .checkpoint,
    [data-theme="dark"] .warning,
    [data-theme="dark"] .recipe-card {
      background: color-mix(in srgb, var(--paper-soft) 86%, #000 14%);
      box-shadow: none;
    }

    .concept-card strong,
    .path-card strong,
    .recipe-card strong {
      display: block;
      margin-bottom: 8px;
      color: var(--accent);
      font-size: 0.95rem;
    }

    .checkpoint {
      border-left: 3px solid #2477ff;
    }

    .warning {
      border-left: 3px solid #2db7e5;
    }

    .tagline {
      color: var(--muted);
      font-size: 1.04rem;
      font-style: italic;
    }

    .markdown-section pre,
    .markdown-section .mermaid {
      margin: 1.35rem 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--code-theme-background);
      box-shadow: none;
    }

    .markdown-section pre {
      padding: 1rem 1.1rem;
    }

    .markdown-section code {
      font-family: "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
      font-size: 0.88em;
    }

    .markdown-section p code,
    .markdown-section li code,
    .markdown-section td code {
      border-radius: 4px;
      padding: 0.12em 0.32em;
    }

    .markdown-section .mermaid {
      padding: 18px;
      overflow: auto;
    }

    .markdown-section table {
      display: block;
      width: 100%;
      margin: 1.4rem 0;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      border-spacing: 0;
      border-collapse: separate;
      font-size: 0.92rem;
    }

    .markdown-section table thead {
      background: var(--table-head-background);
    }

    .markdown-section th,
    .markdown-section td {
      min-width: 9rem;
      padding: 0.78rem 0.9rem;
      border-color: var(--line);
      vertical-align: top;
    }

    .markdown-section hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 3rem 0;
    }

    .docsify-pagination-container {
      border-top: 1px solid var(--line);
      margin-top: 4rem;
      padding-top: 1.4rem;
      font-family: Georgia, "Noto Serif SC", "Songti SC", serif;
    }

    .docsify-pagination-container a {
      color: var(--ink);
      text-decoration: none;
    }

    .search {
      margin: 0 0 24px;
      padding: 0;
      border: 0;
      background: transparent !important;
    }

    .search .input-wrap {
      background: rgba(236, 246, 255, 0.72) !important;
      border: 1px solid rgba(36, 119, 255, 0.13) !important;
      border-radius: 999px !important;
    }

    .search input {
      width: 100%;
      padding: 9px 12px 9px 34px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      font-family: Georgia, "Noto Serif SC", "Songti SC", serif;
      font-size: 0.84rem;
    }

    .search input:focus {
      outline: none;
    }

    .top-btn-group {
      position: fixed;
      top: 20px;
      right: 42px;
      z-index: 75;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dark-toggle-btn,
    .back-to-top {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      cursor: pointer;
      font-family: Georgia, "Noto Serif SC", "Songti SC", serif;
      transition: transform 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    .dark-toggle-btn {
      width: 34px;
      height: 34px;
      font-size: 0.76rem;
      line-height: 1;
    }

    .back-to-top {
      position: fixed;
      right: 26px;
      bottom: 28px;
      z-index: 70;
      width: 42px;
      height: 42px;
      opacity: 0;
      visibility: hidden;
    }

    .dark-toggle-btn:hover,
    .back-to-top:hover {
      color: var(--accent);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .back-to-top.visible {
      opacity: 1;
      visibility: visible;
    }

    @media (min-width: 981px) {
      body.ready .sidebar,
      body.ready.sticky .sidebar {
        transform: none !important;
      }

      body.ready .content,
      body.ready.sticky .content,
      body.ready.close .content {
        margin-left: 0 !important;
      }

      .sidebar-toggle {
        display: none;
      }
    }

    @keyframes article-rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1180px) {
      .sidebar {
        width: 236px;
        padding-left: 18px !important;
      }

      .markdown-section {
        margin-left: 300px;
        margin-right: auto;
      }

      .sidebar > h1 {
        left: 34px;
      }
    }

    @media (max-width: 980px) {
      body::before {
        display: none;
      }

      .app-nav {
        top: 28px !important;
        right: 26px !important;
      }

      .app-nav ul {
        gap: 16px;
      }

      .top-btn-group {
        top: 24px;
        right: 18px;
      }

      .app-nav {
        display: none;
      }

      .sidebar {
        left: auto !important;
        right: 100% !important;
        top: 0 !important;
        height: 100vh;
        width: min(84vw, 320px);
        padding: 86px 26px 42px !important;
        background: rgba(255, 255, 255, 0.96);
        border: 0;
        border-right: 1px solid var(--line);
        border-radius: 0;
      }

      [data-theme="dark"] .sidebar {
        background: rgba(7, 20, 35, 0.97);
      }

      .sidebar > h1 {
        position: fixed;
        top: 32px;
        left: 80px;
        font-size: 1.65rem;
      }

      .markdown-section {
        width: 100vw !important;
        max-width: 820px;
        margin: 0 auto;
        padding: 96px 26px 96px !important;
      }

      .markdown-section h1 {
        font-size: 2.55rem;
      }

      .markdown-section h1 .title-line {
        display: block;
      }

      .markdown-section h1 .title-line + .title-line::before {
        content: "";
      }

      .markdown-section p,
      .markdown-section li,
      .markdown-section blockquote {
        width: min(760px, calc(100vw - 58px)) !important;
        max-width: min(760px, calc(100vw - 58px)) !important;
        overflow-wrap: anywhere;
        white-space: normal !important;
      }

      .chapter-visual {
        min-height: 220px;
      }
    }

    @media (max-width: 640px) {
      :root {
        --base-font-size: 16px;
      }

      body {
        overflow-x: hidden;
      }

      .content {
        width: 100vw !important;
        max-width: 100vw !important;
        overflow-x: hidden;
      }

      .markdown-section {
        width: 100vw !important;
        max-width: 100vw !important;
        margin: 0 !important;
        padding: 86px 18px 86px !important;
      }

      .markdown-section h1 {
        width: calc(100vw - 36px) !important;
        max-width: calc(100vw - 36px) !important;
        font-size: 1.62rem;
        line-height: 1.12;
        word-break: break-all !important;
        overflow-wrap: anywhere !important;
        white-space: normal !important;
      }

      .markdown-section h1 *,
      .markdown-section p,
      .markdown-section li,
      .markdown-section blockquote {
        word-break: break-all !important;
        overflow-wrap: anywhere !important;
        white-space: normal !important;
      }

      .markdown-section p,
      .markdown-section li,
      .markdown-section blockquote {
        width: min(300px, calc(100vw - 86px)) !important;
        max-width: min(300px, calc(100vw - 86px)) !important;
      }

      .markdown-section > p:first-of-type,
      .markdown-section h1 + p,
      .markdown-section h1 + h3 {
        font-size: 0.95rem;
        line-height: 1.68;
      }

      .markdown-section h1 .title-line {
        display: block;
      }

      .markdown-section h1 .title-line + .title-line::before {
        content: "";
      }

      .markdown-section h2 {
        font-size: 1.42rem;
      }

      .chapter-visual {
        width: calc(100vw - 36px);
        max-width: calc(100vw - 36px);
        margin: 22px 0 24px;
        min-height: 180px;
        aspect-ratio: 4 / 2.7;
      }

      .lesson-grid {
        grid-template-columns: 1fr;
      }

      .markdown-section th,
      .markdown-section td {
        min-width: 11rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      .markdown-section > * {
        animation: none;
      }

      * {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="reading-progress" id="reading-progress"></div>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'LLM PT',
      repo: '',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      auto2top: true,
      coverpage: false,
      search: {
        placeholder: '搜索：SFT、GRPO、DPO、OPD...',
        noData: '没有找到结果',
        depth: 4,
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
        crossChapter: true,
        crossChapterText: true,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制',
      },
      markdown: {
        renderer: {
          code(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });

    function seededRandom(seed) {
      var value = seed % 2147483647;
      if (value <= 0) value += 2147483646;
      return function() {
        value = value * 16807 % 2147483647;
        return (value - 1) / 2147483646;
      };
    }

    function hashText(text) {
      var hash = 0;
      for (var i = 0; i < text.length; i += 1) {
        hash = ((hash << 5) - hash) + text.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash) + 1;
    }

    function drawChapterVisual(canvas, seedText) {
      if (!canvas) return;
      var wrapper = canvas.parentElement;
      var rect = wrapper.getBoundingClientRect();
      var width = Math.max(720, Math.floor(rect.width));
      var height = Math.max(260, Math.floor(rect.height));
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = '100%';
      canvas.style.height = '100%';

      var ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      var dark = document.documentElement.getAttribute('data-theme') === 'dark';
      var rand = seededRandom(hashText(seedText));
      var bg = dark ? '#0d2035' : '#eef7ff';
      var ink = dark ? 'rgba(190,220,255,' : 'rgba(39,96,150,';
      var palette = dark
        ? ['rgba(117,183,255,', 'rgba(103,215,240,', 'rgba(169,221,255,']
        : ['rgba(36,119,255,', 'rgba(45,183,229,', 'rgba(105,199,255,'];

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);

      var peaks = [];
      for (var p = 0; p < 6; p += 1) {
        peaks.push({
          x: width * (0.12 + rand() * 0.76),
          y: height * (0.26 + rand() * 0.48),
          radiusX: width * (0.11 + rand() * 0.12),
          radiusY: height * (0.14 + rand() * 0.2),
          amp: 0.38 + rand() * 0.62,
          color: palette[p % palette.length],
        });
      }

      peaks.forEach(function(peak) {
        var grad = ctx.createRadialGradient(peak.x, peak.y, 0, peak.x, peak.y, peak.radiusX);
        grad.addColorStop(0, peak.color + (0.35 + peak.amp * 0.32) + ')');
        grad.addColorStop(0.44, peak.color + (0.14 + peak.amp * 0.12) + ')');
        grad.addColorStop(1, peak.color + '0)');
        ctx.fillStyle = grad;
        ctx.save();
        ctx.translate(peak.x, peak.y);
        ctx.scale(1, peak.radiusY / peak.radiusX);
        ctx.beginPath();
        ctx.arc(0, 0, peak.radiusX, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });

      function surface(x, y) {
        var total = 0;
        peaks.forEach(function(peak) {
          var dx = (x - peak.x) / peak.radiusX;
          var dy = (y - peak.y) / peak.radiusY;
          total += peak.amp * Math.exp(-(dx * dx + dy * dy) * 2.2);
        });
        return total;
      }

      ctx.lineWidth = 1;
      for (var row = 0; row < 23; row += 1) {
        var yBase = height * 0.18 + row * height * 0.032;
        ctx.beginPath();
        for (var x = -20; x <= width + 20; x += 16) {
          var wave = Math.sin((x * 0.012) + row * 0.65 + rand()) * 4;
          var lift = surface(x, yBase) * height * 0.2;
          var y = yBase + wave - lift;
          if (x === -20) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = ink + (dark ? 0.14 : 0.16) + ')';
        ctx.stroke();
      }

      peaks.forEach(function(peak, index) {
        ctx.beginPath();
        for (var t = 0; t <= Math.PI * 2 + 0.02; t += 0.045) {
          var wobble = 1 + Math.sin(t * 5 + index) * 0.045;
          var x = peak.x + Math.cos(t) * peak.radiusX * 0.42 * wobble;
          var y = peak.y + Math.sin(t) * peak.radiusY * 0.28 * wobble;
          if (t === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = peak.color + (dark ? 0.62 : 0.54) + ')';
        ctx.lineWidth = 1.35;
        ctx.stroke();
      });

      ctx.fillStyle = dark ? 'rgba(255,255,255,0.035)' : 'rgba(255,255,255,0.32)';
      ctx.fillRect(0, 0, width, height);
    }

    function insertChapterVisual() {
      var section = document.querySelector('.markdown-section');
      if (!section) return;
      var title = section.querySelector('h1');
      if (!title || section.querySelector('.chapter-visual')) return;

      var figure = document.createElement('figure');
      figure.className = 'chapter-visual';
      figure.setAttribute('aria-label', 'Abstract post-training distribution landscape');
      var canvas = document.createElement('canvas');
      figure.appendChild(canvas);

      var anchor = title.nextElementSibling;
      if (anchor && anchor.tagName === 'H3') anchor.insertAdjacentElement('afterend', figure);
      else title.insertAdjacentElement('afterend', figure);

      drawChapterVisual(canvas, window.location.hash + '|' + title.textContent);
    }

    function redrawChapterVisual() {
      var canvas = document.querySelector('.chapter-visual canvas');
      var title = document.querySelector('.markdown-section h1');
      if (canvas && title) drawChapterVisual(canvas, window.location.hash + '|' + title.textContent);
    }

    function renderMermaidBlocks() {
      document.querySelectorAll('.mermaid').forEach(function(el) {
        if (el.getAttribute('data-processed')) return;
        var code = el.textContent;
        var id = 'mermaid-' + Math.random().toString(36).slice(2);
        mermaid.render(id, code).then(function(result) {
          el.innerHTML = result.svg;
          el.setAttribute('data-processed', 'true');
        }).catch(function(err) {
          console.warn('Mermaid render error:', err);
        });
      });
    }

    function formatTitleLines() {
      var title = document.querySelector('.markdown-section h1');
      if (!title || title.dataset.formattedTitle === 'true') return;
      var text = title.textContent.trim();
      if (!text || text.length < 14) return;

      var lines = [];
      var numbered = text.match(/^(\d+\.)\s+(.+)$/);
      if (numbered) {
        var rest = numbered[2];
        var firstSpace = rest.indexOf(' ');
        if (firstSpace > 0 && firstSpace < 18) {
          lines = [numbered[1] + ' ' + rest.slice(0, firstSpace), rest.slice(firstSpace + 1)];
        } else {
          lines = [numbered[1], rest];
        }
      } else {
        var split = text.indexOf(' ');
        if (split > 0 && split < 18) lines = [text.slice(0, split), text.slice(split + 1)];
      }

      if (lines.length < 2) return;
      title.innerHTML = lines.map(function(line) {
        return '<span class="title-line">' + line.replace(/[&<>"']/g, function(ch) {
          return {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[ch];
        }) + '</span>';
      }).join('');
      title.dataset.formattedTitle = 'true';
    }

    function syncMobileSidebar() {
      if (window.innerWidth <= 980) {
        document.body.classList.remove('close');
      } else {
        document.body.classList.remove('close');
      }
    }

    window.$docsify.plugins = (window.$docsify.plugins || []).concat([
      function(hook) {
        hook.doneEach(function() {
          syncMobileSidebar();
          var group = document.getElementById('top-btn-group');
          if (!group) {
            group = document.createElement('div');
            group.id = 'top-btn-group';
            group.className = 'top-btn-group';
            document.body.appendChild(group);
          }

          if (!document.getElementById('dark-toggle')) {
            var darkBtn = document.createElement('button');
            darkBtn.id = 'dark-toggle';
            darkBtn.className = 'dark-toggle-btn';
            darkBtn.title = '切换深色模式';
            var isDark = localStorage.getItem('theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            darkBtn.textContent = isDark ? '日' : '夜';
            darkBtn.addEventListener('click', function() {
              var current = document.documentElement.getAttribute('data-theme');
              var next = current === 'dark' ? 'light' : 'dark';
              document.documentElement.setAttribute('data-theme', next);
              localStorage.setItem('theme', next);
              darkBtn.textContent = next === 'dark' ? '日' : '夜';
              mermaid.initialize({ startOnLoad: false, theme: next === 'dark' ? 'dark' : 'default' });
              document.querySelectorAll('.mermaid[data-processed]').forEach(function(el) {
                el.removeAttribute('data-processed');
              });
              renderMermaidBlocks();
              redrawChapterVisual();
            });
            group.appendChild(darkBtn);
          }

          formatTitleLines();
          insertChapterVisual();
          renderMermaidBlocks();
          setTimeout(redrawChapterVisual, 80);
        });
      }
    ]);

    (function() {
      var saved = localStorage.getItem('theme');
      document.documentElement.setAttribute('data-theme', saved || 'light');

      var btn = document.createElement('button');
      btn.className = 'back-to-top';
      btn.title = '回到顶部';
      btn.textContent = '↑';
      btn.addEventListener('click', function() {
        var main = document.querySelector('.markdown-section');
        if (main) main.scrollIntoView({ behavior: 'smooth' });
        else window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      document.body.appendChild(btn);

      function getScrollContainer() {
        return document.querySelector('main.content') || document.querySelector('.content') || window;
      }

      var ticking = false;
      function onScroll() {
        if (ticking) return;
        requestAnimationFrame(function() {
          var container = getScrollContainer();
          var scrollTop, scrollHeight, clientHeight;
          if (container === window) {
            scrollTop = window.scrollY;
            scrollHeight = document.documentElement.scrollHeight;
            clientHeight = window.innerHeight;
          } else {
            scrollTop = container.scrollTop;
            scrollHeight = container.scrollHeight;
            clientHeight = container.clientHeight;
          }

          btn.classList.toggle('visible', scrollTop > 280);
          var progress = scrollHeight > clientHeight ? (scrollTop / (scrollHeight - clientHeight)) * 100 : 0;
          var bar = document.getElementById('reading-progress');
          if (bar) bar.style.width = Math.min(progress, 100) + '%';
          ticking = false;
        });
        ticking = true;
      }

      function attachScroll() {
        var container = getScrollContainer();
        (container === window ? window : container).addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
      }

      window.addEventListener('resize', function() {
        window.clearTimeout(window.__chapterVisualResize);
        window.__chapterVisualResize = window.setTimeout(redrawChapterVisual, 120);
        syncMobileSidebar();
      });

      window.addEventListener('DOMContentLoaded', function() {
        syncMobileSidebar();
        setTimeout(attachScroll, 500);
      });
    })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
</body>
</html>
